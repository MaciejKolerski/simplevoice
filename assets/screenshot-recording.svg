<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2433"/>
      <stop offset="1" stop-color="#080b11"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="pillShadow" x="-30%" y="-60%" width="160%" height="260%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- desktop backdrop -->
  <rect x="20" y="20" width="860" height="280" rx="22" fill="url(#desk)"/>
  <rect x="20" y="20" width="860" height="280" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>

  <!-- glow under overlay -->
  <ellipse cx="450" cy="170" rx="240" ry="70" fill="url(#glow)"/>

  <!-- floating recording overlay (NSPanel-style pill) -->
  <g filter="url(#pillShadow)">
    <rect x="312" y="134" width="276" height="64" rx="32" fill="#0d0d0e" fill-opacity="0.92"
          stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  </g>
  <rect x="313" y="135" width="274" height="20" rx="20" fill="#ffffff" fill-opacity="0.04"/>

  <!-- record dot -->
  <circle cx="344" cy="166" r="5.5" fill="#ff453a"/>
  <circle cx="344" cy="166" r="10" fill="#ff453a" fill-opacity="0.18"/>

  <!-- waveform bars -->
  <g fill="url(#wave)">
    <rect x="372" y="152" width="7" height="28" rx="3.5"/>
    <rect x="388" y="144" width="7" height="44" rx="3.5"/>
    <rect x="404" y="136" width="7" height="60" rx="3.5"/>
    <rect x="420" y="148" width="7" height="36" rx="3.5"/>
    <rect x="436" y="130" width="7" height="72" rx="3.5"/>
    <rect x="452" y="146" width="7" height="40" rx="3.5"/>
    <rect x="468" y="140" width="7" height="52" rx="3.5"/>
    <rect x="484" y="150" width="7" height="32" rx="3.5"/>
    <rect x="500" y="156" width="7" height="20" rx="3.5"/>
  </g>

  <!-- timer -->
  <text x="556" y="171" font-size="15" fill="#ededed" text-anchor="end"
        font-family="ui-monospace, monospace" letter-spacing="0.5">0:07</text>

  <!-- caption -->
  <text x="450" y="244" font-size="12.5" fill="#9aa4b2" text-anchor="middle"
        font-family="ui-monospace, monospace" letter-spacing="1">LISTENING — SPEAK, AND IT BECOMES TEXT</text>
</svg>

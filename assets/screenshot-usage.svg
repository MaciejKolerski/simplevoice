<svg width="1000" height="640" viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="winTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121214"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- window -->
  <g filter="url(#shadow)">
    <rect x="20" y="16" width="960" height="600" rx="16" fill="#000000" stroke="#222222" stroke-width="1"/>
  </g>

  <!-- title bar -->
  <path d="M20 32 a16 16 0 0 1 16 -16 h928 a16 16 0 0 1 16 16 v24 h-960 z" fill="url(#winTop)"/>
  <line x1="20" y1="56" x2="980" y2="56" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="44" cy="36" r="6" fill="#ff5f57"/>
  <circle cx="64" cy="36" r="6" fill="#febc2e"/>
  <circle cx="84" cy="36" r="6" fill="#28c840"/>

  <!-- sidebar -->
  <rect x="20" y="56" width="208" height="560" fill="#0a0a0a"/>
  <line x1="228" y1="56" x2="228" y2="616" stroke="#1a1a1a" stroke-width="1"/>

  <!-- brand -->
  <g transform="translate(48,88)" fill="#ffffff">
    <g transform="scale(0.062)">
      <rect x="8" y="98" width="36" height="144" rx="18"/>
      <rect x="86" y="50" width="36" height="240" rx="18"/>
      <rect x="164" y="8" width="36" height="324" rx="18"/>
      <rect x="242" y="50" width="36" height="240" rx="18"/>
      <rect x="320" y="98" width="36" height="144" rx="18"/>
    </g>
    <text x="34" y="17" font-size="16" font-weight="600" fill="#ededed" letter-spacing="-0.5">Simplevoice</text>
  </g>

  <!-- nav -->
  <g font-size="13.5">
    <rect x="40" y="140" width="168" height="38" rx="9" fill="#1b1b1d"/>
    <rect x="54" y="153" width="13" height="13" rx="2" fill="none" stroke="#ededed" stroke-width="1.6"/>
    <line x1="58" y1="163" x2="58" y2="159" stroke="#ededed" stroke-width="1.6"/><line x1="62" y1="163" x2="62" y2="156" stroke="#ededed" stroke-width="1.6"/>
    <text x="80" y="164" fill="#ededed" font-weight="500">Usage</text>

    <g fill="#7a7a7a" stroke="#7a7a7a">
      <circle cx="60" cy="201" r="6.5" fill="none" stroke-width="1.6"/>
      <text x="80" y="206" fill="#888888" stroke="none" font-weight="500">Models</text>

      <path d="M55 243 h10 M55 248 h10 M55 253 h7" stroke-width="1.6"/>
      <text x="80" y="253" fill="#888888" stroke="none" font-weight="500">History</text>

      <circle cx="60" cy="295" r="5.5" fill="none" stroke-width="1.6"/><circle cx="60" cy="295" r="1.6" fill="#888888" stroke="none"/>
      <text x="80" y="300" fill="#888888" stroke="none" font-weight="500">Settings</text>
    </g>
  </g>

  <!-- engine status (sidebar bottom) -->
  <g transform="translate(40,556)">
    <rect x="0" y="0" width="168" height="40" rx="10" fill="#0f0f10" stroke="#1f1f1f"/>
    <circle cx="16" cy="20" r="4" fill="#34d399"/>
    <text x="30" y="17" font-size="11" fill="#ededed" font-weight="500">Local engine</text>
    <text x="30" y="31" font-size="10" fill="#666666" font-family="ui-monospace, monospace">Parakeet TDT v3</text>
  </g>

  <!-- main: header -->
  <text x="260" y="104" font-size="28" font-weight="600" fill="#ededed" letter-spacing="-0.8">Usage</text>
  <text x="260" y="130" font-size="13.5" fill="#777777">Your dictation, measured. Everything stays on this device.</text>

  <!-- stat cards -->
  <g>
    <rect x="260" y="156" width="220" height="104" rx="14" fill="#0a0a0a" stroke="#1f1f1f"/>
    <text x="280" y="186" font-size="10.5" fill="#666666" font-family="ui-monospace, monospace" letter-spacing="1">WORDS TRANSCRIBED</text>
    <text x="280" y="226" font-size="34" font-weight="600" fill="#ededed" letter-spacing="-1">48,210</text>

    <rect x="494" y="156" width="220" height="104" rx="14" fill="#0a0a0a" stroke="#1f1f1f"/>
    <text x="514" y="186" font-size="10.5" fill="#666666" font-family="ui-monospace, monospace" letter-spacing="1">TIME DICTATED</text>
    <text x="514" y="226" font-size="34" font-weight="600" fill="#ededed" letter-spacing="-1">6.4<tspan font-size="20" fill="#888888"> h</tspan></text>

    <rect x="728" y="156" width="232" height="104" rx="14" fill="#0a0a0a" stroke="#1f1f1f"/>
    <text x="748" y="186" font-size="10.5" fill="#666666" font-family="ui-monospace, monospace" letter-spacing="1">TRANSCRIPTIONS</text>
    <text x="748" y="226" font-size="34" font-weight="600" fill="#ededed" letter-spacing="-1">312</text>
  </g>

  <!-- chart card -->
  <rect x="260" y="284" width="700" height="300" rx="14" fill="#0a0a0a" stroke="#1f1f1f"/>
  <text x="284" y="320" font-size="14" font-weight="600" fill="#ededed">Words per day</text>
  <text x="284" y="340" font-size="11" fill="#666666" font-family="ui-monospace, monospace">LAST 7 DAYS</text>

  <!-- bars -->
  <g>
    <rect x="300"  y="430" width="64" height="120" rx="8" fill="url(#barFill)"/>
    <rect x="392"  y="392" width="64" height="158" rx="8" fill="url(#barFill)"/>
    <rect x="484"  y="460" width="64" height="90"  rx="8" fill="url(#barFill)"/>
    <rect x="576"  y="358" width="64" height="192" rx="8" fill="url(#barFill)"/>
    <rect x="668"  y="408" width="64" height="142" rx="8" fill="url(#barFill)"/>
    <rect x="760"  y="470" width="64" height="80"  rx="8" fill="url(#barFill)"/>
    <rect x="852"  y="376" width="64" height="174" rx="8" fill="url(#barFill)"/>
  </g>
  <g font-size="10.5" fill="#5a5a5a" font-family="ui-monospace, monospace" text-anchor="middle">
    <text x="332" y="568">Mon</text><text x="424" y="568">Tue</text><text x="516" y="568">Wed</text>
    <text x="608" y="568">Thu</text><text x="700" y="568">Fri</text><text x="792" y="568">Sat</text><text x="884" y="568">Sun</text>
  </g>
</svg>

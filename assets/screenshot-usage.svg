<svg width="1096" height="880" viewBox="0 0 1096 880" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Inter Variable', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
     role="img" aria-label="Simplevoice Usage dashboard: Overview with Time Transcribed, Words Generated and Active Model cards above a 7-day Activity Details chart.">
  <defs>
    <!-- bar fills (per-bar object bounding box, bottom -> top) -->
    <linearGradient id="barFill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="barFillToday" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="winShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="soft" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <clipPath id="winClip">
      <rect x="28" y="20" width="1040" height="812" rx="14"/>
    </clipPath>
  </defs>

  <!-- window body + drop shadow -->
  <g filter="url(#winShadow)">
    <rect x="28" y="20" width="1040" height="812" rx="14" fill="#000000"/>
  </g>

  <!-- clipped app content -->
  <g clip-path="url(#winClip)">
    <g transform="translate(28,20)">

      <!-- ===== TITLE BAR ===== -->
      <rect x="0" y="0" width="1040" height="40" fill="#000000"/>
      <line x1="0" y1="40" x2="1040" y2="40" stroke="#222222" stroke-width="1"/>
      <!-- traffic lights -->
      <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
      <circle cx="40" cy="20" r="6" fill="#febc2e"/>
      <circle cx="60" cy="20" r="6" fill="#28c840"/>
      <!-- hamburger -->
      <svg x="102" y="11.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
      <!-- breadcrumb -->
      <text x="520" y="24.5" text-anchor="middle" font-size="12" font-weight="500">
        <tspan fill="#888888">Simplevoice</tspan><tspan fill="#555555">&#160;&#160;/&#160;&#160;</tspan><tspan fill="#ededed">Usage</tspan>
      </text>

      <!-- ===== SIDEBAR ===== -->
      <line x1="240" y1="40" x2="240" y2="812" stroke="#222222" stroke-width="1"/>
      <!-- active pill -->
      <rect x="12" y="52" width="215" height="35.5" rx="8" fill="#1f1f1f"/>
      <!-- nav: Usage (active) -->
      <svg x="24" y="61.8" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ededed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
      <text x="52" y="74" font-size="13" font-weight="500" fill="#ededed">Usage</text>
      <!-- nav: Models -->
      <svg x="24" y="99.3" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
      <text x="52" y="111.5" font-size="13" font-weight="500" fill="#888888">Models</text>
      <!-- nav: Transcriptions -->
      <svg x="24" y="136.8" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      <text x="52" y="149" font-size="13" font-weight="500" fill="#888888">Transcriptions</text>
      <!-- nav: Settings (bottom) -->
      <svg x="24" y="774.3" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
      <text x="52" y="786.5" font-size="13" font-weight="500" fill="#888888">Settings</text>

      <!-- ===== HEADER ===== -->
      <text x="280" y="106" font-size="24" font-weight="500" fill="#ffffff" letter-spacing="-0.6">Overview</text>
      <!-- time-range select -->
      <rect x="836" y="80" width="160" height="36" rx="8" fill="#0a0a0a" stroke="#222222" stroke-width="1"/>
      <svg x="847" y="91.5" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
      <text x="866" y="102.5" font-size="12" fill="#ededed">Last 7 days</text>
      <svg x="972" y="90" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>

      <!-- ===== STAT CARDS ===== -->
      <!-- Card 1: Time Transcribed -->
      <rect x="280" y="140" width="229.3" height="193.7" rx="16" fill="#0a0a0a" stroke="#222222" stroke-width="1"/>
      <text x="305" y="176.5" font-size="11" font-weight="600" fill="#555555" letter-spacing="0.5">TIME TRANSCRIBED</text>
      <svg x="470.3" y="165.8" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <text x="305" y="248" font-size="36" font-weight="500" fill="#ffffff" letter-spacing="-1.8" font-family="'JetBrains Mono', 'JetBrains Mono Variable', ui-monospace, 'SF Mono', Menlo, monospace">4h 17m</text>
      <svg x="305" y="293" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></svg>
      <text x="320" y="304" font-size="12" font-weight="600" fill="#34d399">+12%</text>
      <text x="358" y="304" font-size="12" fill="#555555" fill-opacity="0.7">vs last period</text>

      <!-- Card 2: Words Generated -->
      <rect x="525.3" y="140" width="229.3" height="193.7" rx="16" fill="#0a0a0a" stroke="#222222" stroke-width="1"/>
      <text x="550.3" y="176.5" font-size="11" font-weight="600" fill="#555555" letter-spacing="0.5">WORDS GENERATED</text>
      <svg x="715.3" y="165.8" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      <text x="550.3" y="248" font-size="36" font-weight="500" fill="#ffffff" letter-spacing="-1.8" font-family="'JetBrains Mono', 'JetBrains Mono Variable', ui-monospace, 'SF Mono', Menlo, monospace">9,840</text>
      <svg x="550.3" y="293" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></svg>
      <text x="565.3" y="304" font-size="12" font-weight="600" fill="#34d399">+16%</text>
      <text x="603.3" y="304" font-size="12" fill="#555555" fill-opacity="0.7">vs last period</text>

      <!-- Card 3: Active Model -->
      <rect x="770.7" y="140" width="229.3" height="193.7" rx="16" fill="#0a0a0a" stroke="#222222" stroke-width="1"/>
      <text x="795.7" y="176.5" font-size="11" font-weight="600" fill="#555555" letter-spacing="0.5">ACTIVE MODEL</text>
      <svg x="960.7" y="165.8" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/><path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/><path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/><path d="M7 20v2"/><path d="M7 2v2"/><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>
      <text x="795.7" y="234" font-size="20" font-weight="500" fill="#ffffff" letter-spacing="-0.4">Parakeet TDT v3</text>
      <circle cx="798.7" cy="285.7" r="3" fill="#34d399"/>
      <text x="808" y="290" font-size="12" fill="#555555" fill-opacity="0.7">Running locally</text>

      <!-- ===== ACTIVITY DETAILS CHART ===== -->
      <rect x="280" y="366.7" width="720" height="420" rx="16" fill="#0a0a0a" stroke="#222222" stroke-width="1"/>
      <text x="305" y="407.5" font-size="16" font-weight="500" fill="#ffffff">Activity Details</text>
      <!-- legend -->
      <ellipse cx="863.8" cy="402.7" rx="9" ry="9" fill="#ffffff" opacity="0.25" filter="url(#soft)"/>
      <circle cx="863.8" cy="402.7" r="4" fill="#ffffff"/>
      <text x="875.8" y="407" font-size="12" font-weight="500" fill="#888888">Time Transcribed</text>

      <!-- y-axis labels -->
      <g font-size="11" fill="#555555" text-anchor="end" font-family="'JetBrains Mono', 'JetBrains Mono Variable', ui-monospace, 'SF Mono', Menlo, monospace">
        <text x="353" y="466.5">1h 0m</text>
        <text x="353" y="555">40m 0s</text>
        <text x="353" y="643.5">20m 0s</text>
        <text x="353" y="732">0s</text>
      </g>
      <!-- gridlines -->
      <line x1="369" y1="460.7" x2="975" y2="460.7" stroke="#222222" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="369" y1="552.7" x2="975" y2="552.7" stroke="#222222" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="369" y1="644.7" x2="975" y2="644.7" stroke="#222222" stroke-width="1" stroke-dasharray="4 3"/>
      <line x1="369" y1="736.7" x2="975" y2="736.7" stroke="#333333" stroke-width="1"/>

      <!-- bar tracks -->
      <g fill="#ffffff" fill-opacity="0.03">
        <rect x="377"   y="454.7" width="78.6" height="282" rx="12"/>
        <rect x="463.6" y="454.7" width="78.6" height="282" rx="12"/>
        <rect x="550.1" y="454.7" width="78.6" height="282" rx="12"/>
        <rect x="636.7" y="454.7" width="78.6" height="282" rx="12"/>
        <rect x="723.3" y="454.7" width="78.6" height="282" rx="12"/>
        <rect x="809.8" y="454.7" width="78.6" height="282" rx="12"/>
      </g>
      <rect x="896.4" y="454.7" width="78.6" height="282" rx="12" fill="#ffffff" fill-opacity="0.05"/>

      <!-- today glow -->
      <ellipse cx="935.7" cy="491.4" rx="46" ry="20" fill="#ffffff" opacity="0.16" filter="url(#soft)"/>

      <!-- bar fills -->
      <rect x="377"   y="592.9" width="78.6" height="143.8" rx="12" fill="url(#barFill)"/>
      <rect x="463.6" y="505.5" width="78.6" height="231.2" rx="12" fill="url(#barFill)"/>
      <rect x="550.1" y="623.9" width="78.6" height="112.8" rx="12" fill="url(#barFill)"/>
      <rect x="636.7" y="454.7" width="78.6" height="282"   rx="12" fill="url(#barFill)"/>
      <rect x="723.3" y="542.1" width="78.6" height="194.6" rx="12" fill="url(#barFill)"/>
      <rect x="809.8" y="657.8" width="78.6" height="79"    rx="12" fill="url(#barFill)"/>
      <rect x="896.4" y="491.4" width="78.6" height="245.3" rx="12" fill="url(#barFillToday)"/>

      <!-- day labels -->
      <g font-size="12" text-anchor="middle">
        <text x="416.3" y="756.5" fill="#888888">Mon</text>
        <text x="502.9" y="756.5" fill="#888888">Tue</text>
        <text x="589.4" y="756.5" fill="#888888">Wed</text>
        <text x="676.0" y="756.5" fill="#888888">Thu</text>
        <text x="762.6" y="756.5" fill="#888888">Fri</text>
        <text x="849.1" y="756.5" fill="#888888">Sat</text>
        <text x="935.7" y="756.5" fill="#ffffff" font-weight="600">Sun</text>
      </g>

    </g>
  </g>

  <!-- crisp window edge over clipped content -->
  <rect x="28" y="20" width="1040" height="812" rx="14" fill="none" stroke="#2a2a2a" stroke-width="1"/>
</svg>

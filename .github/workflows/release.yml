name: "publish"

on:
  push:
    tags:
      - "v*" # Triggers on tags starting with 'v', e.g., v0.2.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15-intel" # Intel Mac (native x86_64; macos-13 was retired Dec 2025)
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Linux
            target: ""
            args: ""
          - platform: "windows-latest" # Windows
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Tauri base deps + this app's extras: ALSA (cpal capture) and Vulkan.
      # The whisper-rs `vulkan` feature compiles shaders with `glslc`, which is
      # not in the Ubuntu 22.04 repos, so pull the Vulkan SDK (headers + loader
      # + glslc) from LunarG instead.
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            vulkan-sdk

      # The `pnpm tauri` wrapper (scripts/tauri.js) redirects the Cargo target dir
      # to a short path on Windows (260-char limit + static CRT for sherpa-onnx).
      # Mirror it here so tauri-action looks in the same place for the bundles.
      - name: configure windows build (windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo 'CARGO_TARGET_DIR=C:\t\sv' >> "$GITHUB_ENV"

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Reuse scripts/tauri.js so Windows gets its static-CRT / target-dir
          # fixes (no-op passthrough on macOS and Linux).
          tauriScript: pnpm tauri
          tagName: v__VERSION__ # This automatically extracts the version from tauri.conf.json
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Update both AUR packages after the release is published. The first import of
  # each package is manual (see aur/README.md); this job handles later versions.
  publish-aur:
    needs: publish-tauri
    runs-on: ubuntu-22.04
    env:
      AUR_MAINTAINER_NAME: "Woro"
      AUR_MAINTAINER_EMAIL: "woro@tanieddosy.pl"
    steps:
      - uses: actions/checkout@v4

      - name: derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # simplevoice-bin: prebuilt .deb from the published release
      - name: prepare simplevoice-bin PKGBUILD
        run: |
          cd aur/simplevoice-bin
          DEB_URL="https://github.com/MaciejKolerski/simplevoice/releases/download/v${VERSION}/Simplevoice_${VERSION}_amd64.deb"
          curl -fL -o pkg.deb "$DEB_URL"
          SHA=$(sha256sum pkg.deb | cut -d' ' -f1)
          rm pkg.deb
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA}')/" PKGBUILD

      - name: publish simplevoice-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: simplevoice-bin
          pkgbuild: ./aur/simplevoice-bin/PKGBUILD
          assets: ./aur/simplevoice-bin/simplevoice-bin.install
          commit_username: ${{ env.AUR_MAINTAINER_NAME }}
          commit_email: ${{ env.AUR_MAINTAINER_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.VERSION }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

      # simplevoice: built from source from the tag
      - name: prepare simplevoice PKGBUILD
        run: |
          cd aur/simplevoice
          TAR_URL="https://github.com/MaciejKolerski/simplevoice/archive/refs/tags/v${VERSION}.tar.gz"
          curl -fL -o src.tar.gz "$TAR_URL"
          SHA=$(sha256sum src.tar.gz | cut -d' ' -f1)
          rm src.tar.gz
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" PKGBUILD

      - name: publish simplevoice to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: simplevoice
          pkgbuild: ./aur/simplevoice/PKGBUILD
          assets: ./aur/simplevoice/simplevoice.install
          commit_username: ${{ env.AUR_MAINTAINER_NAME }}
          commit_email: ${{ env.AUR_MAINTAINER_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.VERSION }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

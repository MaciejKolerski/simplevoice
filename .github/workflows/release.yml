name: "publish"

on:
  push:
    tags:
      - "v*" # Triggers on tags starting with 'v', e.g., v0.2.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13" # Intel Mac (native x86_64 runner; ort can't cross-compile)
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Linux
            target: ""
            args: ""
          - platform: "windows-latest" # Windows
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Tauri base deps + this app's extras: ALSA (cpal capture) and Vulkan.
      # The whisper-rs `vulkan` feature compiles shaders with `glslc`, which is
      # not in the Ubuntu 22.04 repos, so pull the Vulkan SDK (headers + loader
      # + glslc) from LunarG instead.
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            vulkan-sdk

      # The `pnpm tauri` wrapper (scripts/tauri.js) redirects the Cargo target dir
      # to a short path on Windows (260-char limit + static CRT for sherpa-onnx).
      # Mirror it here so tauri-action looks in the same place for the bundles.
      - name: configure windows build (windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo 'CARGO_TARGET_DIR=C:\t\sv' >> "$GITHUB_ENV"

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Reuse scripts/tauri.js so Windows gets its static-CRT / target-dir
          # fixes (no-op passthrough on macOS and Linux).
          tauriScript: pnpm tauri
          tagName: v__VERSION__ # This automatically extracts the version from tauri.conf.json
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
